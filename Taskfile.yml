version: '3'

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: Build the server binary to bin/server
    cmds:
      - go build -o bin/server ./cmd/server/

  run:
    desc: Run the server
    cmds:
      - go run ./cmd/server/

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet across all packages
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  check:
    desc: Format, vet, and build (run before committing)
    cmds:
      - task: fmt
      - task: vet
      - task: build
